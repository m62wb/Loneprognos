    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lön IKEM">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%234a6cf7'/><stop offset='100%' style='stop-color:%2310b981'/></linearGradient></defs><circle cx='50' cy='50' r='48' fill='url(%23g)'/><text x='50' y='68' font-size='50' font-weight='bold' text-anchor='middle' fill='white' font-family='Arial'>L</text></svg>">
    
    <style>

<body>
    <!-- ... (samma HTML-struktur som tidigare) ... -->
    <script>
        // ... (all befintlig JavaScript-kod oförändrad) ...
    </script>

    <!-- PWA-registrering och manifest -->
    <script>
        // Generera manifest som blob-URL för att kunna använda inline-ikoner
        const manifest = {
            name: "Löneprognos IKEM Uppsala",
            short_name: "Lön IKEM",
            description: "Löneprognos 2026-2036 för IKEM-avtalet",
            start_url: location.href,
            display: "standalone",
            background_color: "#1a202c",
            theme_color: "#4a6cf7",
            icons: [{
                src: "data:image/svg+xml," + encodeURIComponent(
                    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#4a6cf7"/>
                                <stop offset="100%" style="stop-color:#10b981"/>
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="48" fill="url(#g)"/>
                        <text x="50" y="68" font-size="50" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">L</text>
                    </svg>`
                ),
                sizes: "100x100",
                type: "image/svg+xml"
            }]
        };

        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestUrl = URL.createObjectURL(manifestBlob);

        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestUrl;
        document.head.appendChild(link);

        // Registrera service worker för offline-stöd
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register(
                    URL.createObjectURL(new Blob([`
                        const CACHE_NAME = 'loneprognos-v1';
                        const urlsToCache = ['/'];

                        self.addEventListener('install', event => {
                            event.waitUntil(
                                caches.open(CACHE_NAME)
                                    .then(cache => cache.addAll(urlsToCache))
                            );
                        });

                        self.addEventListener('fetch', event => {
                            event.respondWith(
                                caches.match(event.request)
                                    .then(response => response || fetch(event.request))
                            );
                        });
                    `], {type: 'application/javascript'}))
                ).catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
